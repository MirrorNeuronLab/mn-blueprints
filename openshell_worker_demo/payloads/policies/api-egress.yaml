version: 1

network_policies:
  example_api:
    name: example-api
    endpoints:
      - host: api.example.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: "/v1/health"
          - allow:
              method: POST
              path: "/v1/ingest"
      - host: 203.0.113.10
        port: 443
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/python3
      - path: /usr/local/bin/python3
