<html>
  <body style="margin:0;padding:0;background-color:#e7f8ff;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">{{preheader}}</div>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#e7f8ff;background-image:linear-gradient(135deg,#e7f8ff 0%,#fff7cc 52%,#ffe2ef 100%);padding:28px 0;">
      <tr>
        <td align="center" style="padding:0 14px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:650px;background:#ffffff;border-radius:22px;overflow:hidden;border:5px solid #ffffff;box-shadow:0 14px 30px rgba(31,41,55,0.12);">
            <tr>
              <td style="padding:20px 30px;background:#2f86c6;font-family:Arial,sans-serif;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td valign="middle">
                      <table role="presentation" cellpadding="0" cellspacing="0">
                        <tr>
                          <td style="width:16px;height:16px;background:#f24f5f;border:2px solid #ffffff;"></td>
                          <td style="width:16px;height:16px;background:#ffcf33;border:2px solid #ffffff;"></td>
                          <td style="width:16px;height:16px;background:#35b779;border:2px solid #ffffff;"></td>
                        </tr>
                        <tr>
                          <td style="width:16px;height:16px;background:#7c5cff;border:2px solid #ffffff;"></td>
                          <td style="width:16px;height:16px;background:#ff8a3d;border:2px solid #ffffff;"></td>
                          <td style="width:16px;height:16px;background:#f069a6;border:2px solid #ffffff;"></td>
                        </tr>
                      </table>
                    </td>
                    <td valign="middle" style="padding-left:12px;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#ffffff;font-weight:900;">Bibblio</td>
                    <td align="right" valign="middle" style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#fff7cc;font-weight:900;">{{eyebrow}}</td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:30px 36px 10px;font-family:Arial,sans-serif;background:#fffaf2;">
                <p data-slot="headline" style="margin:0 0 12px;font-size:21px;line-height:1.45;color:{{text_color}};font-family:Arial,sans-serif;font-weight:900;">{{headline}}</p>
                <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 22px;">
                  <tr>
                    <td style="width:36px;height:6px;background:#f24f5f;border-radius:999px;"></td>
                    <td style="width:7px;"></td>
                    <td style="width:36px;height:6px;background:#ffcf33;border-radius:999px;"></td>
                    <td style="width:7px;"></td>
                    <td style="width:36px;height:6px;background:#35b779;border-radius:999px;"></td>
                  </tr>
                </table>
                {{#body_sections}}<p data-slot="body_section" style="margin:0 0 15px;font-size:16px;line-height:1.68;color:{{text_color}};font-family:Arial,sans-serif;">{{body_section}}</p>{{/body_sections}}
                <p style="margin:20px 0 0;font-size:16px;line-height:1.65;color:{{text_color}};font-family:Arial,sans-serif;">
                  <a data-slot="cta_button" href="{{cta_url}}" style="display:inline-block;background:#f24f5f;color:#ffffff;text-decoration:none;font-weight:900;padding:13px 20px;border-radius:9px;box-shadow:0 4px 0 rgba(150,42,54,0.20);">{{cta_label}}</a>
                </p>
                <p data-slot="secondary_text" style="margin:18px 0 0;font-size:15px;line-height:1.6;color:#516171;font-family:Arial,sans-serif;">{{secondary_text}}</p>
                <p style="margin:18px 0 0;font-size:15px;line-height:1.6;color:{{text_color}};font-family:Arial,sans-serif;font-weight:800;">{{signature}}</p>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 36px 28px;background:#fffaf2;font-family:Arial,sans-serif;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fff7cc;border-radius:16px;border:3px solid #ffffff;">
                  <tr>
                    <td style="padding:16px 18px;">
                      <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                        <tr>
                          <td valign="middle" style="font-size:26px;line-height:1;width:44px;">&#128218;</td>
                          <td valign="middle" style="font-size:13px;line-height:1.5;color:#24415f;font-weight:800;">A small story can make a big feeling easier to talk about.</td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 36px 28px;background:#24415f;font-family:Arial,sans-serif;">
                <p data-slot="footer_text" style="margin:0 0 10px;font-size:12px;line-height:1.6;color:#dff5fb;">{{footer_text}}</p>
                <p style="margin:0;font-size:12px;line-height:1.6;color:#dff5fb;">
                  <a href="{{preference_center_url}}" style="color:#ffcf33;">Manage preferences</a> &middot; <a href="{{unsubscribe_url}}" style="color:#ffcf33;">Unsubscribe</a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
