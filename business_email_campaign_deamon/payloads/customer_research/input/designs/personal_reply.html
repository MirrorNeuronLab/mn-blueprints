<html>
  <body style="margin:0;padding:0;background-color:#ecebe7;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">{{preheader}}</div>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#ecebe7;padding:28px 0;">
      <tr>
        <td align="center" style="padding:0 14px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;background:#ffffff;border-radius:18px;overflow:hidden;box-shadow:0 12px 28px rgba(31,41,55,0.08);">
            <tr>
              <td style="padding:22px 30px;background:#f4f8ed;border-bottom:1px solid #e3ead8;font-family:Arial,sans-serif;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td valign="middle">
                      <span style="display:inline-block;width:34px;height:34px;border-radius:50%;background:#8fbc55;color:#ffffff;font-weight:800;text-align:center;line-height:34px;">B</span>
                      <span style="font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#2f3437;font-weight:800;margin-left:10px;">Bibblio</span>
                    </td>
                    <td align="right" valign="middle" style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:{{accent}};font-weight:800;">{{eyebrow}}</td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:30px 34px 10px;font-family:Arial,sans-serif;">
                <p data-slot="headline" style="margin:0 0 12px;font-size:20px;line-height:1.45;color:{{text_color}};font-family:Arial,sans-serif;font-weight:800;">{{headline}}</p>
                <div style="width:72px;height:3px;background:#ef6b64;border-radius:999px;margin:0 0 22px;"></div>
                {{#body_sections}}<p data-slot="body_section" style="margin:0 0 15px;font-size:16px;line-height:1.68;color:{{text_color}};font-family:Arial,sans-serif;">{{body_section}}</p>{{/body_sections}}
                <p style="margin:18px 0 0;font-size:16px;line-height:1.65;color:{{text_color}};font-family:Arial,sans-serif;">
                  <a data-slot="cta_button" href="{{cta_url}}" style="color:#ef6b64;text-decoration:underline;font-weight:700;">{{cta_label}}</a>
                </p>
                <p data-slot="secondary_text" style="margin:18px 0 0;font-size:15px;line-height:1.6;color:#52606d;font-family:Arial,sans-serif;">{{secondary_text}}</p>
                <p style="margin:18px 0 0;font-size:15px;line-height:1.6;color:{{text_color}};font-family:Arial,sans-serif;font-weight:700;">{{signature}}</p>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 34px 28px;font-family:Arial,sans-serif;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f8fafc;border-radius:14px;">
                  <tr>
                    <td style="padding:18px 20px;">
                      <p data-slot="footer_text" style="margin:0 0 10px;font-size:12px;line-height:1.6;color:#6b7280;">{{footer_text}}</p>
                      <p style="margin:0;font-size:12px;line-height:1.6;color:#6b7280;">
                        <a href="{{preference_center_url}}" style="color:{{accent}};">Manage preferences</a> · <a href="{{unsubscribe_url}}" style="color:{{accent}};">Unsubscribe</a>
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
